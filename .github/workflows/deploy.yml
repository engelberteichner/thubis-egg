name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time Lovable updates your code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps 

      - name: Build
        run: npm run build

      - name: Create GitHub Pages 404 Redirect
        # Im SPA-Modus wird die index.html in .output/public generiert.
        # Wir kopieren sie als 404.html, damit auch Direktaufrufe von Unterseiten klappen.
        run: cp ./.output/public/index.html ./.output/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
