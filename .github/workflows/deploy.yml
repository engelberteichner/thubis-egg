name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time Lovable updates your code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Removed "cache: npm" to prevent lockfile missing crashes completely

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Generate index.html for static hosting
        run: node scripts/generate-index-html.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
