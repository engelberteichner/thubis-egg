name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time Lovable updates your code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps 

      - name: Build
        run: npm run build

      - name: Prepare Static Files for GitHub Pages
        # Dieser Schritt stellt sicher, dass sowohl index.html als auch 404.html existieren, 
        # egal ob das Framework _shell.html oder index.html generiert hat.
        run: |
          PUBLIC_DIR="./.output/public"
          if [ -f "$PUBLIC_DIR/_shell.html" ]; then
            cp "$PUBLIC_DIR/_shell.html" "$PUBLIC_DIR/index.html"
            cp "$PUBLIC_DIR/_shell.html" "$PUBLIC_DIR/404.html"
            echo "Successfully generated fallback from _shell.html"
          elif [ -f "$PUBLIC_DIR/index.html" ]; then
            cp "$PUBLIC_DIR/index.html" "$PUBLIC_DIR/404.html"
            echo "Successfully generated fallback from index.html"
          else
            echo "Error: No entry HTML file generated in $PUBLIC_DIR!"
            ls -la $PUBLIC_DIR
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
