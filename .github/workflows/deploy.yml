name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time Lovable updates your code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps 

      - name: Build
        # Wir zwingen Nitro über env, den statischen Export zu starten
        env:
          NITRO_PRESET: github-pages
        run: npm run build

      - name: Prepare Static Files for GitHub Pages
        # Im statischen Modus liegt alles in dist. Wir sichern uns mit der 404.html ab.
        run: |
          if [ -f "./dist/index.html" ]; then
            cp ./dist/index.html ./dist/404.html
            echo "Successfully prepared dist folder"
          elif [ -f "./.output/public/index.html" ]; then
            cp ./.output/public/index.html ./.output/public/404.html
            mkdir -p ./dist
            cp -r ./.output/public/* ./dist/
            echo "Successfully moved from .output to dist"
          else
            echo "Error: index.html not found anywhere!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
