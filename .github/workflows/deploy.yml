name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time you push code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps 

      - name: Build
        run: npm run build

      - name: Prepare Static Files for GitHub Pages
        # Dieser Schritt sucht den Build-Ordner, verlinkt dein Apple-Icon korrekt und erstellt das 404-Fallback
        run: |
          if [ -d "./dist/client" ]; then
            TARGET_DIR="./dist/client"
          elif [ -d "./.output/public" ]; then
            TARGET_DIR="./.output/public"
          else
            echo "Error: Standard build paths not found!"
            exit 1
          fi
          
          echo "Target deployment directory set to: $TARGET_DIR"
          
          # 1. Sicherstellen, dass die index.html existiert
          if [ -f "$TARGET_DIR/_shell.html" ] && [ ! -f "$TARGET_DIR/index.html" ]; then
            cp "$TARGET_DIR/_shell.html" "$TARGET_DIR/index.html"
          fi
          
          # 2. Apple Touch Icon Pfad hart in den HTML <head> injizieren
          if [ -f "$TARGET_DIR/apple-touch-icon.png" ]; then
            echo "Found apple-touch-icon.png. Injecting iOS shortcut headers..."
            # Fügt die korrekten iOS-Metadaten und den Pfad direkt vor dem </head>-Tag ein
            sed -i "s|</head>|<link rel=\"apple-touch-icon\" href=\"/thubis-egg/apple-touch-icon.png\"><meta name=\"apple-mobile-web-app-capable\" content=\"yes\"></head>|g" "$TARGET_DIR/index.html"
          else
            echo "Warning: apple-touch-icon.png was not compiled into $TARGET_DIR!"
          fi
          
          # 3. Das 404.html Fallback mit dem injizierten Icon klonen
          cp "$TARGET_DIR/index.html" "$TARGET_DIR/404.html"
          
          echo "DEPLOY_PATH=$TARGET_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
