name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build every time you push code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps 

      - name: Build
        run: npm run build

      - name: Prepare Static Files for GitHub Pages
        # Wir wissen jetzt, dass die statischen Dateien in ./dist/client liegen.
        run: |
          if [ -d "./dist/client" ]; then
            TARGET_DIR="./dist/client"
          elif [ -d "./.output/public" ]; then
            TARGET_DIR="./.output/public"
          else
            echo "Error: Standard build paths not found!"
            exit 1
          fi
          
          echo "Target deployment directory set to: $TARGET_DIR"
          
          # Prüfen, ob die Einstiegsdatei _shell.html oder index.html heißt und Fallback sichern
          if [ -f "$TARGET_DIR/_shell.html" ]; then
            cp "$TARGET_DIR/_shell.html" "$TARGET_DIR/index.html"
            cp "$TARGET_DIR/_shell.html" "$TARGET_DIR/404.html"
            echo "Generated index.html and 404.html from _shell.html"
          elif [ -f "$TARGET_DIR/index.html" ]; then
            cp "$TARGET_DIR/index.html" "$TARGET_DIR/404.html"
            echo "Generated 404.html from index.html"
          else
            echo "Error: Neither index.html nor _shell.html found in $TARGET_DIR!"
            ls -la $TARGET_DIR
            exit 1
          fi
          
          echo "DEPLOY_PATH=$TARGET_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
